<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Star Shop - Firebase</title>
<style>
body{margin:0;font-family:Arial;background:#f5fff5}
header{background:green;color:white;padding:15px;text-align:center}
nav{display:flex;justify-content:center;background:#004d00;flex-wrap:wrap}
nav a{color:white;padding:14px;text-decoration:none}
nav a:hover{background:white;color:green}
.container{padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.product{border:1px solid #ccc;padding:10px;text-align:center;border-radius:10px;background:white}
.product img{width:100%;height:200px;object-fit:cover}
button{background:green;color:white;border:none;padding:10px;margin-top:10px;cursor:pointer;border-radius:5px}
.cart-box{position:fixed;right:10px;top:80px;width:260px;background:white;border:2px solid green;padding:10px;border-radius:10px}
input{padding:8px;margin:5px 0;width:100%}
footer{background:green;color:white;text-align:center;padding:10px;margin-top:20px}
</style>
</head>
<body>

<header>
<h1>Bright Star Shop</h1>
<p>Real Online Store</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#login">Login</a>
</nav>

<div class="container" id="products">
<h2>Products</h2>
<div class="products" id="productList"></div>
</div>

<div class="cart-box">
<h3>Cart</h3>
<ul id="cartList"></ul>
<p>Total: $<span id="total">0</span></p>
<button onclick="checkout()">Checkout</button>
</div>

<div class="container" id="login">
<h2>Register / Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<div class="container">
<h2>Add Product (Admin)</h2>
<input id="pname" placeholder="Product name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<button onclick="addProduct()">Add Product</button>
</div>

<footer>
<p>&copy; 2026 Bright Star Shop</p>
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let cart=[]; let total=0;

function register(){
let email=document.getElementById('email').value;
let pass=document.getElementById('password').value;
auth.createUserWithEmailAndPassword(email,pass)
.then(()=>msg('Registered successfully'))
.catch(e=>msg(e.message));
}

function login(){
let email=document.getElementById('email').value;
let pass=document.getElementById('password').value;
auth.signInWithEmailAndPassword(email,pass)
.then(()=>msg('Login successful'))
.catch(e=>msg(e.message));
}

function msg(t){document.getElementById('msg').innerText=t;}

function addProduct(){
let name=document.getElementById('pname').value;
let price=parseFloat(document.getElementById('pprice').value);
let img=document.getElementById('pimg').value;

db.collection('products').add({name,price,img})
.then(()=>alert('Product added'));
}

function loadProducts(){
db.collection('products').onSnapshot(snapshot=>{
let list=document.getElementById('productList');
list.innerHTML='';
snapshot.forEach(doc=>{
let p=doc.data();
list.innerHTML+=`
<div class="product">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>`;
});
});
}

function addToCart(name,price){
cart.push({name,price});
total+=price;
updateCart();
}

function updateCart(){
let list=document.getElementById('cartList');
list.innerHTML='';
cart.forEach(i=>{
list.innerHTML+=`<li>${i.name} - $${i.price}</li>`;
});
document.getElementById('total').innerText=total;
}

function checkout(){
alert('Order placed successfully!');
cart=[]; total=0; updateCart();
}

loadProducts();
</script>

</body>
</html>
